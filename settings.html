<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Student Support System</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div id="navbar-container"></div>

    <main class="main-content">
        <div class="container">
            <section class="settings-section">
                <h1>Settings</h1>

                <article class="card account-card">
                    <div class="card-header">
                        <h2>Account Settings</h2>
                    </div>
                    <div class="card-body account-layout">
                        <div class="profile-image-placeholder" aria-hidden="true">Student</div>
                        <div class="profile-details">
                            <p><strong>Name:</strong> <span id="profileName"></span></p>
                            <p><strong>Student ID:</strong> <span id="profileStudentId"></span></p>
                            <p><strong>Email:</strong> <span id="profileEmail"></span></p>
                            <p><strong>Phone:</strong> <span id="profilePhone"></span></p>
                            <p><strong>Major:</strong> <span id="profileMajor"></span></p>
                            <button id="changePasswordBtn" type="button" class="btn btn-secondary">Change Password</button>
                        </div>
                    </div>
                </article>

                <article class="card">
                    <div class="card-header">
                        <h2>Notification Preferences</h2>
                    </div>
                    <div class="card-body">
                        <div class="settings-option">
                            <label for="prefEmail">
                                <input type="checkbox" id="prefEmail">
                                Email notifications
                            </label>
                        </div>
                        <div class="settings-option">
                            <label for="prefPush">
                                <input type="checkbox" id="prefPush">
                                Push notifications
                            </label>
                        </div>
                        <div class="settings-option">
                            <label for="prefWeekly">
                                <input type="checkbox" id="prefWeekly">
                                Weekly summary
                            </label>
                        </div>
                        <div class="settings-actions">
                            <button id="saveSettingsBtn" type="button" class="btn btn-primary">Save Settings</button>
                            <button id="signOutBtn" type="button" class="btn btn-danger">Sign Out</button>
                        </div>
                    </div>
                </article>
            </section>
        </div>
    </main>

    <div id="footer-container"></div>

    <script src="scripts/scripts.js"></script>
</body>
</html>
