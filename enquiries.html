<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiries - Student Support System</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div id="navbar-container"></div>

    <main class="main-content">
        <div class="container">
            <section class="enquiries-page-section">
                <h1>All Enquiries</h1>

                <article class="card">
                    <div class="card-header">
                        <h2>Search and Manage</h2>
                    </div>
                    <div class="card-body">
                        <div class="search-grid">
                            <div class="form-group">
                                <label for="searchDetails">Search Enquiry Details</label>
                                <input id="searchDetails" type="text" placeholder="Type detail keywords...">
                            </div>
                            <div class="form-group">
                                <label for="searchStatus">Search Status</label>
                                <select id="searchStatus">
                                    <option value="">All status</option>
                                    <option value="Submitted">Submitted</option>
                                    <option value="Resolving">Resolving</option>
                                    <option value="Appointment">Appointment</option>
                                    <option value="Resolved">Resolved</option>
                                    <option value="Canceled">Canceled</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="searchDate">Search Date</label>
                                <input id="searchDate" type="date">
                            </div>
                        </div>

                        <div class="table-wrap">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Enquiry ID</th>
                                        <th>Student ID</th>
                                        <th>Details</th>
                                        <th>Category</th>
                                        <th>Staff In Charge</th>
                                        <th>Status</th>
                                        <th>Response</th>
                                        <th>Date</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="allEnquiriesTableBody">
                                    <tr>
                                        <td colspan="9" class="empty-cell">No enquiries available.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </article>
            </section>
        </div>
    </main>

    <div id="enquiryDetailModal" class="modal">
        <div class="modal-content">
            <button id="enquiryDetailClose" class="close" type="button" aria-label="Close enquiry detail">&times;</button>
            <h2>Enquiry Detail</h2>
            <div id="enquiryDetailBody"></div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="scripts/scripts.js"></script>
</body>
</html>
