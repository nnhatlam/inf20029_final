<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student List - Student Support System</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <div id="navbar-container"></div>

    <main class="main-content">
        <div class="container">
            <section class="manager-students-section">
                <div class="dashboard-header">
                    <div>
                        <h1>Student List</h1>
                        <p class="role-greeting">Manager access only</p>
                    </div>
                </div>

                <article class="card">
                    <div class="card-header">
                        <h2>Search Students</h2>
                    </div>
                    <div class="card-body">
                        <div class="search-grid">
                            <div class="form-group student-search-field">
                                <label for="studentSearchInput">Search by Student Name or ID</label>
                                <input id="studentSearchInput" type="text" placeholder="Type a student name or ID...">
                            </div>
                            <div class="search-actions">
                                <button id="studentSearchClear" type="button" class="btn btn-secondary">Clear</button>
                            </div>
                        </div>
                        <p id="studentResultCount" class="student-result-count">0 students found</p>
                    </div>
                </article>

                <article class="card">
                    <div class="card-header">
                        <h2>All Students</h2>
                    </div>
                    <div class="card-body">
                        <div class="table-wrap">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Student ID</th>
                                        <th>Name</th>
                                        <th>Major</th>
                                        <th>DOB</th>
                                        <th>Email</th>
                                        <th>Phone</th>
                                    </tr>
                                </thead>
                                <tbody id="studentTableBody">
                                    <tr>
                                        <td colspan="6" class="empty-cell">No student data loaded.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </article>
            </section>
        </div>
    </main>

    <div id="studentDetailModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="studentDetailName" aria-hidden="true" hidden>
        <div class="modal-content">
            <button id="studentDetailClose" class="close" type="button" aria-label="Close student detail">&times;</button>
            <h2 id="studentDetailName">Student Detail</h2>
            <div id="studentDetailBody"></div>
        </div>
    </div>

    <div id="footer-container"></div>

    <script src="scripts/scripts.js"></script>
</body>
</html>
